gather_health:
  description: >
    VAULT READ: First, call vault_read('context/compliance-trend.md') to get
    the rolling compliance trend. Use this to calculate streak data
    (consecutive RED days, improvement trajectory). If file not found, proceed
    without — this may be the first run.

    Then call compliance_health_check to get the complete daily compliance snapshot.
    This single tool call returns: Vanta health data, delta from yesterday,
    critical items needing action with ClickUp links, sprint compliance tasks,
    and backlog statistics.

    Call it ONCE and return the full JSON output. Do NOT summarize or
    paraphrase the numbers — return the exact tool output.
  expected_output: >
    The EXACT JSON returned by compliance_health_check with keys:
    vanta, delta, needs_action, sprint_compliance, backlog, errors.
    Plus any trend context from the vault.
  agent: gather_agent

post_report:
  description: >
    Format the gathered data into 5 parameters for post_compliance_report
    and post ONE message to {slack_compliance}.

    health_headline: Build from vanta.health_indicator, delta.consecutive_red_days,
    and vanta.pass_rate. Example: "RED (5 consecutive days) -- 51% pass rate"

    changes_section: Build from delta fields using Slack mrkdwn.
    If delta.has_previous is false: "_First run -- no previous data for comparison_"
    Otherwise: "+N new failures | -M resolved | net: +/-X"
    Then list each delta.new_failures item with clickup_url if available:
    "* :new: Test Name\n  -> <https://app.clickup.com/t/abc123|link>"
    And each delta.resolved: "* :white_check_mark: Test Name -- resolved"

    needs_action_section: Build from needs_action list.
    Each item: "* Name -- critical, no owner\n  -> <clickup_url|link>"
    If list is empty: "_All critical items have owners_"

    sprint_compliance_section: Build from sprint_compliance list.
    Each item: "* Name -- Assignee -- status\n  -> <clickup_url|link>"
    If list is empty: pass empty string ""

    footer_stats: Use EXACT numbers:
    "{backlog.open_compliance_tasks} total | {vanta.critical_failing} critical | {vanta.pass_rate} Vanta pass rate"

    IMPORTANT: Call post_compliance_report EXACTLY ONCE with these 5 params.
    Do NOT use the generic 'post' tool. When it returns ok:true, stop.

    VAULT WRITE: After posting to Slack, call vault_write with:
    - crew: 'compliance'
    - content: markdown with YAML frontmatter containing today's health status,
      pass rate, critical failures count, delta summary, and needs_action count.
      Format:
      ---
      date: YYYY-MM-DD
      crew: compliance
      type: daily
      health: RED|YELLOW|GREEN
      pass_rate: N%
      critical_failing: N
      ---
      ## Compliance Health — YYYY-MM-DD
      ... key findings ...

    Also call vault_write with crew='context', filename='compliance-trend.md'
    to overwrite the rolling trend with: today's status, pass rate, and
    a list of the last entries you read plus today's entry (max 30 entries).
  expected_output: >
    Confirmation of report posted to Slack and written to vault.
  agent: post_agent
  context:
    - gather_health
