gather_health:
  description: >
    Collect compliance health data from two sources:

    1. Call compliance_health_check to get open compliance task count
       and a sample of critical compliance tasks.

    2. Call get_vanta_compliance_health_summary for live Vanta health
       data including failing controls, test failures, evidence gaps,
       and overall health indicator (GREEN/YELLOW/RED).

    Compile results into a structured summary with:
    - vanta_health: GREEN/YELLOW/RED with critical issue count
    - open_tasks: total count with sample of highest priority items
    - critical_findings: any critical items requiring immediate attention
    - status_summary: one-line status
  expected_output: >
    JSON: {vanta_health: str, open_compliance_tasks: N, critical_findings: [],
    status_summary: str}
  agent: gather_agent

post_report:
  description: >
    Post ONE combined report to {slack_compliance} using post_compliance_report
    (NOT the generic post tool). Pass these 4 parameters:
    - vanta_health: "RED — 13 critical issues (11 unowned)" or "GREEN — 0 critical"
    - open_tasks: "283 open compliance tasks (sample: Physical Security Policy, Non-Compliant Devices...)"
    - critical_findings: bullet list of any critical findings, or "None"
    - status_summary: "Vanta Health: RED | Tasks: 283 | Alerts: 2 | Date: 2026-03-21"

    IMPORTANT: Post everything in ONE message using post_compliance_report.
    Do NOT post separate messages for alert and status.
  expected_output: >
    Confirmation of report posted to Slack.
  agent: post_agent
  context:
    - gather_health
