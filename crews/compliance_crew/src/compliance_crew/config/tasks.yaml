health_check:
  description: >
    Daily Vanta health check. Three steps:

    1. Call get_vanta_compliance_health_summary (MCP tool) to get the
       full health report. This single tool returns: health indicator,
       failing controls (SOC2 + HIPAA), BAA gaps, vulnerabilities,
       people risks, access reviews, upcoming deadlines.

    2. Analyze the health summary:
       - If health_indicator is RED or critical_issues_total > 0,
         create alerts in Alerts list (901326439234) for each critical finding.
         Post each to #compliance via post_compliance_alert_to_slack.
       - If health is GREEN with 0 issues, no alerts needed.

    3. Count open compliance tasks by calling get_tasks_by_list on
       Master Backlog (901326439232). Count tasks tagged 'compliance'.

    4. Post daily status to #compliance via post_to_slack_channel:
       'Vanta Health: [status] | Open compliance tasks: N |
       Critical alerts: N | Date: today'
  expected_output: >
    JSON: {health: str, critical_issues: N, open_compliance_tasks: N,
    alerts_created: N, status_posted: bool}
  agent: compliance_agent
