vanta_sweep:
  description: >
    Daily Vanta compliance sweep. For EVERY finding, check_duplicate_task
    first, then create in Master Backlog (901326439232) with tags.

    1. get_health_summary() - Record overall GREEN/YELLOW/RED.
    2. SOC 2 failing controls: create tasks tagged ['compliance', 'soc2', 'vanta'],
       7-day due date.
    3. HIPAA failing controls: create tasks tagged ['compliance', 'hipaa', 'vanta'],
       5-day due date. Post each to #compliance.
    4. Failing automated tests: create tasks tagged ['compliance', 'vanta'].
    5. Critical/high vulnerabilities: create tasks tagged ['security', domain_tag, 'vanta'].
       Critical=3d due, high=7d due. Check SLA breaches.
    6. BAA gaps: create urgent tasks tagged ['compliance', 'hipaa', 'baa', 'vanta'],
       2-day due. Create alert in Alerts (901326439234). Immediate #compliance post.
    7. Overdue access reviews (>90d): create critical tasks, immediate alert.
    8. People risks: offboarded users with access -> immediate alert and task.
       Missing MFA -> task tagged ['security', 'compliance'].
    9. Vendor questionnaires: overdue -> create tasks.
    10. Overdue policies: create review tasks tagged ['compliance'].
    11. Write daily compliance report to ClickUp Docs (AI System doc: xnum1-9333)
        with: health status, counts, new tasks, alerts sent.
  expected_output: >
    JSON: {health: str, soc2_findings: N, hipaa_findings: N, vulns: N,
    baa_gaps: N, access_reviews: N, people_risks: N, tasks_created: N,
    alerts_sent: N}
  agent: compliance_agent
