health_check:
  description: >
    Daily compliance health check. Two steps:

    1. Call batch_compliance_check. This single tool returns:
       - Vanta health (GREEN/YELLOW/RED, failing controls, BAA gaps, vulns, people risks)
       - Open compliance task count from Master Backlog
       - Sample of compliance tasks

    2. Based on the results:
       - If health is RED or has critical issues, create alerts in Alerts
         list (901326439234) using create_task_in_list and post to #pm-compliance.
       - Post daily status to #pm-compliance:
         'Vanta Health: [status] | Open compliance tasks: N | Date: today'

    That's it. Two tool calls total.
  expected_output: >
    JSON: {health: str, critical_issues: N, open_compliance_tasks: N,
    alerts_created: N, status_posted: bool}
  agent: compliance_agent
