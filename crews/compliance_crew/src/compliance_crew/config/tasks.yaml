health_check:
  description: >
    Daily compliance health check. Three steps:

    1. Call compliance_health_check to get the open compliance task count
       from the Master Backlog (268+ tasks).

    2. Call get_vanta_compliance_health_summary (MCP tool, auto-injected)
       to get live Vanta health data: GREEN/YELLOW/RED indicator,
       failing controls, BAA gaps, vulnerabilities, people risks.
       NOTE: This is an MCP tool — just call it by name, no import needed.

    3. Based on both results:
       - If Vanta health is RED or critical_issues > 0, create alerts
         in Alerts list (901326439234) and post to #pm-compliance.
       - Post daily status to #pm-compliance:
         'Vanta Health: [status] | Open compliance tasks: N | Date: today'
  expected_output: >
    JSON: {vanta_health: str, open_compliance_tasks: N,
    alerts_created: N, status_posted: bool}
  agent: compliance_agent
