scan:
  description: >
    Full PR and CI scan across all carespace-ai repos:

    1. Fetch all open PRs. Identify stale (>7d) and critical stale (>30d).
    2. For stale PRs: find best reviewer via get_contributors, check
       check_duplicate_task first, then create task in Master Backlog
       (901326439232) with tags [domain, 'pr-review', 'github']. 2 SP.
    3. For critical stale (>30d): create urgent alert in Alerts (901326439234).
    4. Check CI status on main branches of: carespace-ui, carespace-api-gateway,
       carespace-admin, carespace-sdk. For failures, check_duplicate_task first,
       then create task in Master Backlog with tags [domain, 'ci-fix', 'github']. 3 SP.
    5. Detect duplicate branches (PRs with similar names or same target).
    6. Post summary to #engineering with counts and key items.
  expected_output: >
    JSON: {total_prs: N, stale_prs: N, critical_stale: N, ci_failures: N,
    tasks_created: N, alerts_created: N, duplicate_branches: []}
  agent: pr_radar_agent
