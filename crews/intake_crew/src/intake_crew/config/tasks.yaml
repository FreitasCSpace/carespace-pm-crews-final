intake_scan:
  description: >
    Scan all carespace-ai GitHub repos for open issues and PRs.

    For EVERY issue found:
    1. Call check_duplicate_task with 'repo#N' pattern.
       If ANY match found: SKIP. Do NOT create task, comment, alert, or Slack post.
    2. Only if zero matches: determine domain from repo mapping, classify type
       and priority from title/labels.
    3. Create task in Master Backlog (901326439232) with:
       - Title: '[TYPE] Short desc (repo#N)'
       - Tags: [domain_tag, type_tag, 'github']
       - Priority based on classification
       - Description includes GitHub URL and body preview
    4. Comment on the GitHub issue with the ClickUp task URL.
    5. For security issues: also create alert in Alerts (901326439234).

    After scanning all repos, post summary to #engineering ONLY if
    at least 1 new task was created. Include count by domain and type.
  expected_output: >
    JSON summary: {scanned_repos: N, issues_found: N, tasks_created: N,
    duplicates_skipped: N, security_alerts: N, by_domain: {}, by_type: {}}
  agent: intake_agent
