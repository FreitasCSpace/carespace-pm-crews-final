intake_scan:
  description: >
    Import GitHub issues into the ClickUp Master Backlog.

    1. Call batch_import_engineering — imports all open issues from
       carespace-ai repos. Returns JSON with tasks_created, duplicates_skipped.

    2. If tasks_created > 0, post summary to {slack_engineering}:
       'Intake complete. Engineering: X new (Y skipped).'

    Each batch tool handles dedup, creation, tagging, and cross-linking
    internally. You do NOT need to process individual issues.

    VAULT WRITE: After completing, call vault_write with:
    - crew: 'intake'
    - content: markdown with frontmatter containing repos_scanned,
      issues_found, tasks_created, duplicates_skipped, and a sample
      of new tasks created (title, priority, domain).
      ---
      date: YYYY-MM-DD
      crew: intake
      type: daily
      tasks_created: N
      duplicates_skipped: N
      ---
      ## Intake Summary — YYYY-MM-DD
      ... details ...
  expected_output: >
    JSON summary: {engineering: {tasks_created, duplicates_skipped},
    total_new: N, slack_posted: bool, vault_written: bool}
  agent: intake_agent

close_sync:
  description: >
    Two-way sync between GitHub and ClickUp. Call sync_closed_issues ONCE.
    GitHub is the source of truth:

    - GitHub closed + ClickUp open → closes ClickUp task
    - GitHub open + ClickUp closed → reopens ClickUp task to "to do"

    Post to {slack_engineering} if ANY changes were made (closed or reopened):
    'Backlog sync: X closed, Y reopened (GitHub source of truth).'

    If clickup_closed == 0 AND clickup_reopened == 0, do NOT post.
  expected_output: >
    JSON: {backlog_scanned: N, github_tasks_found: N, closed_on_github: N,
    clickup_closed: N, reopened_from_github: N, clickup_reopened: N,
    slack_posted: bool}
  agent: intake_agent
  context:
    - intake_scan
