analyze:
  description: >
    Pull all tasks from Active Deals ({active_deals_id}).
    1. Count total deals and group by vertical tag.
    2. Identify at-risk deals: no update >{at_risk_deal_days}d, no assignee, no next step.
    3. Detect coverage gaps: verticals with zero active deals.
    4. Identify top 3 opportunities to accelerate.
    5. Track Echelon deal status specifically.
    6. Move at-risk deals to At-Risk list ({at_risk_deals_id}) by updating them.
    7. Create alerts for orphaned deals (no assignee) in Alerts ({alerts_id}).
    8. Add comments on at-risk deals explaining the risk.
    9. Post full pipeline health report to {slack_gtm} with:
       - Pipeline summary by vertical
       - Deals at risk count and details
       - Coverage gaps
       - Top 3 to accelerate
       - Echelon status
  expected_output: >
    JSON: {total_deals: N, by_vertical: {}, at_risk: N, coverage_gaps: [],
    top_3: [], echelon_status: str, alerts_created: N}
  agent: deal_intel_agent
