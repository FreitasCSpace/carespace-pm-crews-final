scan_accounts:
  description: >
    Scan customer success lists and compile a health report:

    1. Onboarding & Accounts ({onboarding_id}):
       - Pull all tasks via get_tasks_by_list.
       - Find stale onboardings: tasks with date_updated >{stale_onboarding_days} days ago
         that are still open (within {onboarding_sla_days}d SLA window).
       - Find unowned onboardings (no assignee).
       - Identify churn risk signals: no login {churn_no_login_days}+ days,
         >{churn_open_tickets} support tickets, renewal <{churn_renewal_days} days.

    2. Support Escalations ({support_escalations_id}):
       - Pull all tasks via get_tasks_by_list.
       - Find unassigned tickets.
       - Find unresponded tickets (date_updated >{ticket_unresponded_hours}h ago).
       - Find stale tickets (date_updated >{ticket_stale_hours}h ago).

    3. Alerts list ({alerts_id}):
       - For each risk identified above, check_duplicate_task with
         list_id="{alerts_id}" first (search ONLY in Alerts list).
       - If no duplicate: create alert in Alerts list ({alerts_id}) using
         create_task_in_list with appropriate priority and tags.
       - Name format: "[ALERT] 🏥 [type]: [description]"
       - Tags: relevant domain tags + 'customer-success'

    4. Client feedback items tagged 'client-feedback' in Master Backlog ({master_backlog_id}):
       - For each without a linked backlog task, check_duplicate_task with
         list_id="{master_backlog_id}" (search ONLY in Master Backlog).
       - If no duplicate: create task in Master Backlog using create_task_in_list
         titled '[FEEDBACK] summary' with tags [relevant-domain, 'feature', 'client-feedback'].
  expected_output: >
    JSON: {onboardings_at_risk: N, churn_risks: N, unassigned_tickets: N,
    stale_tickets: N, feedback_routed: N, alerts_created: N}
  agent: customer_success_agent

post_cs_summary:
  description: >
    Post summary to {slack_cs} ONLY if actions were taken (alerts created,
    risks detected, or feedback routed). If everything is healthy with
    zero issues, skip posting entirely.

    Use post_cs_alert for individual critical alerts (churn risk, SLA breach).

    For the overall summary, include:
    - Onboarding health: X active, Y stale, Z unowned
    - Support health: X open tickets, Y unresponsive, Z stale
    - Churn risks: details of any flagged accounts
    - Alerts created: what was escalated and why
    - Feedback routed: what was moved to backlog

    Do NOT post if there are zero issues to report.
  expected_output: >
    Confirmation of posts sent (or "No issues — no post needed").
  agent: customer_success_agent
  context:
    - scan_accounts
