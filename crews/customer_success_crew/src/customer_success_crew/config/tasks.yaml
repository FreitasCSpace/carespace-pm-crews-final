monitor:
  description: >
    Daily scan of customer success lists:

    1. Onboarding & Accounts (901326439266):
       - Find stale onboardings (>7d no update within 30d SLA). Add comments.
       - Create alerts for unowned onboardings in Alerts (901326439234).
       - Identify churn risk: no login 14+ days, >3 support tickets,
         renewal <60 days. Create high-priority alerts.

    2. Support Escalations (901326439271):
       - Find unassigned tickets. Create alerts.
       - Find unresponded tickets >24h. Post to #customer-success.
       - Find stale >48h. Create urgent alerts in Alerts list.

    3. Client feedback items tagged 'client-feedback':
       - For each without a linked backlog task, check_duplicate_task first.
       - Create task in Master Backlog (901326439232) titled
         '[FEEDBACK] summary' with tags [relevant-domain, 'feature', 'client-feedback'].
       - Cross-link with comments on both tasks.

    Post summary to #customer-success only if actions taken.
  expected_output: >
    JSON: {onboardings_at_risk: N, churn_risks: N, unassigned_tickets: N,
    stale_tickets: N, feedback_routed: N, alerts_created: N}
  agent: customer_success_agent
