monitor:
  description: >
    Monitor marketing operations across 4 lists.

    1) Content Calendar (901326354907) - find all tasks past their due_date that
    are not marked done. Flag each as overdue content. Add a comment noting days
    overdue.

    2) Marketing Campaigns (901326354910) - find tasks with no assignee or no
    due date. These are at-risk campaigns. Create an alert for each unassigned
    or undated campaign.

    3) Product Launches (901326354911) - find launches with due_date <= 14 days
    from now. For each upcoming launch, auto-create 4 GTM checklist tasks in
    the Product Launches list with high priority:
      a) "GTM: Press Release - [launch name]"
      b) "GTM: Sales Deck Update - [launch name]"
      c) "GTM: Demo Script - [launch name]"
      d) "GTM: Partner Notification - [launch name]"
    Skip creation if GTM tasks already exist for that launch.

    4) Partner Events (901326354916) - find events >30 days out that have no
    subtasks or comments indicating prep has started. Create an alert for each
    event with no prep started.

    Log the automation run using log_run with crew name 'marketing_ops_crew'.
  expected_output: >
    JSON: {overdue_content: N, unassigned_campaigns: N, launches_gtm_created: N}
  agent: marketing_ops_agent
