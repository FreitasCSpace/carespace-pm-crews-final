create_sprint_task:
  description: >
    Call create_or_get_sprint_list. It checks if an active sprint exists:
    - If status = 'active': a sprint is already running. Return it.
    - If status = 'created': a new sprint was created. Proceed.
  expected_output: >
    JSON with list_id, sprint_name, sprint_number, dates, and status.
  agent: sprint_agent

check_candidates_task:
  description: >
    Call list_sprint_candidates to see what the team has selected.

    Report: total candidates, total SP, unassigned tasks, over/under budget.

    If Sprint Candidates is EMPTY, report that the team needs to populate
    it before the sprint can be finalized. Do NOT scan the backlog or
    pick tasks — that is the team's job via /sprint-plan.
  expected_output: >
    Sprint Candidates summary with task list, SP total, and assignment status.
  agent: sprint_agent
  context:
    - create_sprint_task

finalize_task:
  description: >
    IF Sprint Candidates has tasks:
    Call finalize_sprint_from_candidates with the sprint list_id from
    create_sprint_task. This moves ALL candidates into the sprint:
    - Copies each task to the sprint list (with assignees, SP, tags)
    - Deletes each task from Sprint Candidates
    - Closes the backlog original

    IF Sprint Candidates is EMPTY:
    Do NOT pull from the backlog. Report that sprint planning needs
    the team to populate Sprint Candidates first.

    IMPORTANT: Do NOT use scan_backlog_for_sprint or execute_sprint_selection.
    Those tools do not exist. Only use finalize_sprint_from_candidates.
  expected_output: >
    JSON with tasks_moved, total_sp, warnings. Or empty candidates warning.
  agent: sprint_agent
  context:
    - check_candidates_task

post_sprint_plan_task:
  description: >
    Post ONE message to {slack_sprint} using post_sprint_plan.

    Call: post_sprint_plan(sprint_name=<sprint name from create_sprint_task>,
                           sprint_list_id=<list_id from create_sprint_task or finalize_task>)

    The tool fetches tasks directly from ClickUp — you do NOT need to pass task data.

    If candidates were empty or finalize errored, post a warning instead.

    Post ONE message only. Do NOT post to other channels.
  expected_output: >
    Confirmation of Slack post to {slack_sprint}.
  agent: sprint_post_agent
  context:
    - finalize_task
