create_sprint_task:
  description: >
    Call the create_sprint_list tool. It auto-detects the next sprint number
    and dates, then creates the list in ClickUp. Returns the list_id and
    sprint name. No inputs needed — the tool handles everything.
  expected_output: >
    JSON with the new sprint list_id, sprint_name, sprint_number, start_date, end_date.
  agent: sprint_agent

score_and_select_task:
  description: >
    Read the Master Backlog (901326439232). Score every item using the formula:
    priority_weight × security_multi × blocker_multi × compliance_multi + age_bonus.
    Factor in human_priorities: {human_priorities}.
    Select tasks fitting within {target_sp} SP (80% of velocity).
    Scan GitHub for stale PRs >7d -- add 'Review: [PR]' tasks (2 SP each).
    Check CI status on main branches -- add 'Fix CI: [repo]' tasks (3 SP each).
    If any task has no story points, estimate by type.
    Return the ranked selected task list with scores and SP.
  expected_output: >
    JSON array of selected tasks with: task_id, name, score, story_points,
    priority, type, domain_tag, source (backlog/github_pr/github_ci).
    Total SP must not exceed {target_sp}.
  agent: sprint_agent
  context:
    - create_sprint_task

populate_and_assign_task:
  description: >
    Move all selected tasks from the Master Backlog into the new sprint list.
    For GitHub-sourced tasks, create them directly in the sprint list with
    appropriate tags (domain + type).
    Then assign EVERY task to the best-fit engineer:
    1. Match domain tag to engineer domains
    2. Check workload -- never exceed max_tasks
    3. Prefer repo contributors from GitHub history
    4. Tie-break: lowest SP in progress
    5. Set due dates: 1 business day (urgent), 2 days (high), 5 days (normal)
    Update each task with story points if missing and add a comment explaining
    why it was selected and who it was assigned to.
  expected_output: >
    JSON summary: {moved: N, created: N, assigned: N, total_sp: N,
    sprint_list_id: str, assignment_summary: [{task, engineer, reason}]}
  agent: sprint_agent
  context:
    - score_and_select_task

post_sprint_plan_task:
  description: >
    Post the sprint plan to Slack #sprint-board with the sprint name,
    task list with assignees, and total SP. Also post a brief summary
    to #engineering.
  expected_output: >
    Confirmation that sprint plan was posted to Slack.
  agent: sprint_agent
  context:
    - populate_and_assign_task
