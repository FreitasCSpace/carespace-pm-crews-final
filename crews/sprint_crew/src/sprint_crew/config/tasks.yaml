create_sprint_task:
  description: >
    Call the create_sprint_list tool. It auto-detects the next sprint number
    and dates, then creates the list in ClickUp. Returns the list_id and
    sprint name. No inputs needed — the tool handles everything.
  expected_output: >
    JSON with the new sprint list_id, sprint_name, sprint_number, start_date, end_date.
  agent: sprint_agent

score_and_select_task:
  description: >
    Read the Master Backlog (901326439232) using get_tasks_by_list.
    Score every item using the formula:
    priority_weight × security_multi × blocker_multi × compliance_multi + age_bonus.
    Priority weights: urgent=100, high=70, normal=40, low=10.
    Multipliers: security×2.0, blocker×1.8, compliance×1.5.

    Select the top tasks that fit within 48 SP total (80% of velocity).
    Estimate SP for tasks without points: compliance=5, bug=3, feature=5, security=8.

    Also scan GitHub for stale PRs >7d using get_stale_pull_requests.
    Check CI status using get_ci_status on key repos.
    NOTE: Try branch 'main' first, if 404 try 'master'.

    Return the ranked selected task list with scores.
  expected_output: >
    JSON array of selected tasks with: task_id, name, score, story_points,
    priority, tags. Total SP must not exceed 48.
  agent: sprint_agent
  context:
    - create_sprint_task

populate_and_assign_task:
  description: >
    For each selected task from the backlog, use the move_task_to_list tool
    to move it from the Master Backlog into the new sprint list.
    IMPORTANT: Use move_task_to_list (not create_click_up_task).

    For each task:
    1. Call move_task_to_list with the task_id and sprint list_id.
    2. Call update_clickup_task to set story points if missing.
    3. Call update_clickup_task to assign to best-fit engineer:
       - Match domain tags to engineer domains
       - Domain leads: frontend=49000180, backend=49000181, mobile=93908270,
         ai-cv=93908266, infra=111928715
       - Set assignees via: {"assignees": {"add": [user_id]}}
    4. Set due dates via update_clickup_task:
       - urgent: 1 day, high: 2 days, normal: 5 days

    For stale PR and CI fix tasks from GitHub, use create_task_in_list
    to create them directly in the sprint list.
  expected_output: >
    JSON summary: {moved: N, created: N, assigned: N, total_sp: N,
    sprint_list_id: str}
  agent: sprint_agent
  context:
    - score_and_select_task

post_sprint_plan_task:
  description: >
    Post the sprint plan to Slack #sprint-board with the sprint name,
    task list with assignees, and total SP. Also post a brief summary
    to #engineering.
  expected_output: >
    Confirmation that sprint plan was posted to Slack.
  agent: sprint_agent
  context:
    - populate_and_assign_task
