create_sprint_task:
  description: >
    Call create_or_get_sprint_list. It checks if an active sprint exists:
    - If status = 'active': a sprint is already running. Return it.
    - If status = 'created': a new sprint was created. Proceed to plan it.
  expected_output: >
    JSON with list_id, sprint_name, sprint_number, dates, and status.
  agent: sprint_agent

scan_backlog_task:
  description: >
    Check the previous step's status field:
    - If status = 'active': the sprint already exists and hasn't ended.
      Call scan_backlog_for_sprint anyway to check if more tasks should
      be added (if sprint is underfilled), or just report the current state.
    - If status = 'created': scan the backlog to plan the new sprint.

    Call scan_backlog_for_sprint to see all available work grouped by
    type: bugs, features, tasks, compliance. Each item includes: id,
    name, SP, priority, assignees, age in days.
  expected_output: >
    The full backlog scan JSON.
  agent: sprint_agent
  context:
    - create_sprint_task

plan_and_execute_task:
  description: >
    Based on the create_sprint_task status and scan results:

    IF STATUS = 'active' (sprint already running):
    - Check if the sprint needs more tasks (underfilled).
    - If it's already well-populated, just report the status and SKIP
      the execute step. Post a status update instead.
    - If it needs tasks, select additional ones and execute.

    IF STATUS = 'created' (new sprint):
    - Build the sprint from scratch. Analyze the backlog and select
      tasks that create a balanced, productive 2-week sprint.

    SPRINT BUILDING PRINCIPLES:
    1. Budget: {sprint_budget_sp} SP total (80% of velocity)
    2. CRITICAL BUGS FIRST: urgent/high bugs are non-negotiable
    3. FEATURES: pick those that deliver most user value
    4. TASKS: include tasks that unblock other work
    5. COMPLIANCE: max {max_compliance} items (Luis handles these alone)
    6. TEAM BALANCE: spread work across engineers, don't overload anyone
    7. MIX: aim for ~2 bugs + ~5 features + ~2 tasks + ~3 compliance

    To execute: call execute_sprint_selection with the sprint_list_id
    and your chosen task IDs as a JSON array:
    execute_sprint_selection(sprint_list_id="...", task_ids_json='["id1","id2"]')

    This copies tasks to sprint and closes backlog originals.
  expected_output: >
    JSON with tasks_moved, total_sp, reasoning. Or status report if
    sprint was already active and didn't need changes.
  agent: sprint_agent
  context:
    - scan_backlog_task

post_sprint_plan_task:
  description: >
    Post to {slack_sprint} using post_sprint_plan.
    - If new sprint was created: full sprint plan with task list and reasoning.
    - If sprint was already active: status update ("Sprint N still active,
      ends Apr 05, N tasks remaining").
    Also post brief summary to {slack_engineering}.
  expected_output: >
    Confirmation of Slack posts.
  agent: sprint_agent
  context:
    - plan_and_execute_task
