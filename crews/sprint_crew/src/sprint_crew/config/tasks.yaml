create_sprint_task:
  description: >
    Call create_sprint_list. It auto-detects the sprint number and dates,
    creates the list in ClickUp. Returns list_id and sprint name.
  expected_output: >
    JSON with list_id, sprint_name, sprint_number, start_date, end_date.
  agent: sprint_agent

populate_sprint_task:
  description: >
    Call batch_populate_sprint with the sprint list_id from the previous step.
    It scores all backlog tasks, selects the top ones within 48 SP,
    moves them to the sprint, estimates story points, and assigns to
    domain leads. All in one call. Returns a full summary.
  expected_output: >
    JSON with tasks_moved, tasks_assigned, total_sp, sprint_tasks array.
  agent: sprint_agent
  context:
    - create_sprint_task

post_sprint_plan_task:
  description: >
    Post the sprint plan to #pm-sprint-board using post_sprint_plan_to_slack
    with the sprint name, task list, and total SP from the previous step.
    Also post a brief summary to #pm-engineering using post_to_slack_channel.
  expected_output: >
    Confirmation of Slack posts.
  agent: sprint_agent
  context:
    - populate_sprint_task
