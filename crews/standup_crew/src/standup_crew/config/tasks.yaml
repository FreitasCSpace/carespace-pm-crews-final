gather:
  description: >
    Gather the current engineering status from ClickUp and GitHub. Pull all tasks
    from sprint list {sprint_list_id} in ClickUp. Categorize them into:
    Done (status = done/complete/completed/closed), In Progress (status =
    in progress/review), Blocked (status = blocked or has 'blocked' tag).
    Find silently stale tasks -- those marked In Progress but with no update in
    3+ days. Check for PRs open >7 days across all repos. Check CI status on
    key repos for failures on main branches. Compile all findings into a
    structured report object.
  expected_output: >
    JSON object with keys: done (array of task summaries), in_progress (array),
    blocked (array with blocker description), stale_tasks (array with stale_days),
    stale_prs (array with repo, PR number, age_days), ci_failures (array with
    repo and failing checks).
  agent: standup_agent

post_and_escalate:
  description: >
    Using the gathered data, compose and post the daily standup. Format each
    section in tight mrkdwn bullets. Done items get a checkmark. In Progress
    items show assignee and SP. Blocked items show the blocker reason and owner.
    Stale tasks (3+ days no update while In Progress) get flagged with a warning
    in the Needs Attention section along with stale PRs and CI failures. Post
    the formatted standup to #standup. For each blocked task, send a separate
    alert to #alerts with the task URL, owner, and business impact. For stale
    tasks, add a comment on the ClickUp task to flag it as silently stale.
  expected_output: >
    Confirmation that standup was posted to #standup, N blocker alerts sent to
    #alerts, and N stale task comments added. Include counts: {done: N,
    in_progress: N, blocked: N, stale_flagged: N, alerts_sent: N}.
  agent: standup_agent
  context:
    - gather
