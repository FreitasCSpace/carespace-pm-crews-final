read_state:
  description: >
    Gather the current state needed for assignment decisions. Use get_unassigned
    to fetch all unassigned tasks from list {list_id}. Use get_workload to get
    each engineer's current open task count and SP in progress. Use get_members
    to get ClickUp user IDs for assignment. Return the combined state: unassigned
    tasks, workload per engineer, and member ID mappings.
  expected_output: >
    JSON object with three keys: unassigned_tasks (array of task objects),
    workload (object mapping username to open_tasks and sp_in_progress),
    members (array of {id, username, email}).
  agent: task_assigner_agent

assign_all:
  description: >
    For every unassigned task from the previous step, determine the best engineer
    using this algorithm: 1. Extract domain keywords from the task name and tags
    (AI/CV, frontend, backend, iOS, Android, SDK, infra, security). 2. Match to
    engineer domains: fusuma (AI/CV, SDK, mobile, backend), andreCarespace
    (frontend), BMarcano (frontend), Deekshakain (frontend), bhavyasaurabh
    (AI/CV, frontend), binunexturn (frontend, backend), fabiano-carespace
    (backend, infra), YeddulaBharath (iOS, SDK), R-Kapil-Kumar (Android, SDK).
    3. Check workload -- never assign if engineer has >= 8 open tasks. 4. If
    the task references a specific repo, use get_contributors to prefer engineers
    who have committed to that repo. 5. Tie-break: assign to the engineer with
    the lowest SP in progress. 6. Use update_task to set the assignee and a due
    date (5 business days from now for normal priority, 2 days for high, 1 day
    for urgent). 7. Use add_comment to explain the assignment decision on each
    task. 8. After all assignments, post a summary to #engineering using post
    and log the run using log_run.
  expected_output: >
    JSON summary: {assigned: N, skipped: N, assignments: [{task_id, task_name,
    assigned_to, reason, due_date}]}
  agent: task_assigner_agent
  context:
    - read_state
