measure:
  description: >
    Pull all tasks from the completed sprint list ({sprint_list_id}).
    Calculate: planned vs completed tasks and SP, completion rate,
    per-engineer breakdown (tasks done, SP, carry-overs),
    next sprint SP = completed_sp × 0.80.
    Check GitHub: stale PRs, CI status, commit volume across repos.
  expected_output: >
    JSON with all metrics: completion_rate, velocity_sp, planned_sp,
    per_engineer (array), carry_overs (array), github_health,
    recommended_next_sp.
  agent: retrospective_agent

write_retro:
  description: >
    Write the retrospective document as a page in ClickUp Docs
    (Sprint Engine doc: xnum1-4273). Include:
    - Sprint Overview with health score (GREEN/YELLOW/RED)
    - Velocity section (planned vs actual)
    - Per-Engineer Performance table
    - Carry-Over Analysis
    - GitHub Health (PRs, CI)
    - What Went Well
    - What Needs Improvement
    - Action Items (description, assignee, due date, success criteria)
    - Next Sprint Recommendation
  expected_output: >
    Confirmation with doc URL.
  agent: retrospective_agent
  context:
    - measure

post_and_log:
  description: >
    Post retro summary to #sprint-board with: completion %, velocity SP,
    carry-overs, and doc URL. Post brief one-paragraph summary to #engineering.
    Log velocity data as a task in Sprint History (901326439238) for tracking.
  expected_output: >
    Confirmation of Slack posts and velocity log.
  agent: retrospective_agent
  context:
    - write_retro
