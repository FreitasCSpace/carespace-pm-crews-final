find_sprint_task:
  description: >
    Call create_or_get_sprint_list to find the active sprint.
    Returns sprint list_id, name, and end date.
  expected_output: >
    JSON with list_id, sprint_name, status.
  agent: retrospective_agent

measure:
  description: >
    Using the sprint list_id from previous step, pull ALL tasks
    via get_tasks_by_list (include_closed=True to capture done tasks).

    Calculate:
    - Total tasks, done count, in progress count, pending count
    - Completion rate (done / total)
    - Velocity: sum of SP from completed tasks (points field)
    - Per-engineer breakdown: how many tasks/SP each person completed
    - Carry-overs: tasks still in progress or pending (incomplete)
    - Recommended next sprint SP = completed_sp × 0.80
    - List each carryover task by name, assignee, and SP

    Also check GitHub:
    - Stale PRs (>{stale_pr_days}d) using get_stale_pull_requests
    - CI health using get_ci_status on key repos
    - Commit activity using get_repo_activity on carespace-ui
  expected_output: >
    JSON with completion_rate, velocity_sp, planned_sp, per_engineer,
    carry_overs (with details), github_health, recommended_next_sp.
  agent: retrospective_agent
  context:
    - find_sprint_task

close_and_carryover:
  description: >
    Call close_sprint to handle incomplete tasks from the ending sprint.
    This tool:
    - Moves all incomplete tasks back to Master Backlog
    - Tags them with "carryover" so sprint crew picks them first
    - Bumps their priority by 1 level (normal→high, high→urgent)
    - Adds a note "Carried over from Sprint N" to each task

    Record the results: how many tasks carried over, total SP, which tasks.
    The sprint crew will automatically prioritize these carryover tasks
    when building the next sprint.
  expected_output: >
    JSON with carryover count, tasks moved, SP carried over.
  agent: retrospective_agent
  context:
    - measure

post_and_log:
  description: >
    Post the retro summary to {slack_sprint} using post_retro:
    - sprint_name: from the sprint data
    - completion_pct: percentage (e.g., 80.0)
    - velocity_sp: total SP completed
    - carry_over: number of incomplete tasks
    - doc_url: "N/A" (no ClickUp Doc — report is in Slack)

    Include carryover details in the summary:
    "X tasks carried over to backlog (tagged 'carryover', priority bumped).
     Sprint crew will pick them first for Sprint N+1."

    Also post a brief summary to {slack_engineering} using post.

    Log velocity data by creating a task in Sprint History ({sprint_history_id})
    using create_task_in_list:
    - name: "Sprint N Velocity: X SP (Y% completion)"
    - description: full metrics summary including carryover list
  expected_output: >
    Confirmation of Slack posts and velocity log.
  agent: retrospective_agent
  context:
    - close_and_carryover
