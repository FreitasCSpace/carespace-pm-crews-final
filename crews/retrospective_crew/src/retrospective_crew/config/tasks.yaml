measure:
  description: >
    Calculate sprint metrics for {sprint_name} (Sprint {sprint_number}). Use
    get_velocity on {sprint_list_id} to get: planned vs completed task counts,
    planned vs completed story points, completion rate percentage, per-engineer
    breakdown (planned SP, done SP, planned tasks, done tasks), carry-over tasks
    (not done at sprint end), and the recommended SP for next sprint
    (completed_sp x 0.80). Also use get_stale_prs to count stale PRs still open
    at sprint end. Use get_ci on key repos to assess CI health at sprint close.
    Use get_activity on key repos with days=14 to measure commit volume during
    the sprint. Compile all metrics into a structured report.
  expected_output: >
    JSON object with: planned_tasks, completed_tasks, completion_rate_pct,
    planned_sp, completed_sp, next_sprint_recommended_sp, carry_over (array of
    task names and statuses), by_engineer (object), stale_prs_at_close (count),
    ci_health (object with repo statuses), commit_activity (object with repo
    commit counts).
  agent: retrospective_agent

write_retro:
  description: >
    Write the full retrospective document page in ClickUp Docs. Use write_doc_page
    with document_id 'xnum1-4273' (Sprint Engine doc). Page name:
    'Retro: {sprint_name}'. Content must include in markdown: 1. Sprint Overview
    header with sprint number, dates, and health indicator (GREEN/YELLOW/RED based
    on completion rate: >=80% GREEN, >=60% YELLOW, <60% RED). 2. Velocity section
    with planned vs completed SP, completion rate, and trend vs previous sprints.
    3. Per-Engineer Performance table with columns: Engineer, Planned SP, Done SP,
    Tasks Done, Completion %. 4. Carry-Over section listing every incomplete task
    with its status and why it didn't finish (if discernible). 5. GitHub Health
    section with stale PR count and CI status per repo. 6. What Went Well section
    (specific accomplishments). 7. What Needs Improvement section (specific
    problems). 8. Action Items section -- each item must have: description,
    assignee, due date, and measurable success criteria. 9. Next Sprint
    Recommendation with recommended SP budget (completed_sp x 0.80) and
    suggested focus areas based on carry-overs and patterns.
  expected_output: >
    Confirmation that the retro page was written to ClickUp Docs with the page
    name and document ID.
  agent: retrospective_agent
  context:
    - measure

post_and_log:
  description: >
    Post the retrospective summary to Slack and log the run. Use post_retro with
    the sprint name, completion percentage, velocity SP, carry-over count, and
    the ClickUp doc URL. Also post a brief one-paragraph summary to #engineering
    using post highlighting the key takeaway and next sprint's recommended SP.
    Log the run using log_run with crew name 'retrospective_crew', the action
    'Sprint {sprint_number} retrospective', and the result summary including
    completion rate, velocity, and recommended next sprint SP.
  expected_output: >
    Confirmation that retro was posted to #sprint-board, summary posted to
    #engineering, and run was logged. Include: {completion_rate, velocity_sp,
    carry_over_count, next_sprint_sp, doc_url}.
  agent: retrospective_agent
  context:
    - write_retro
