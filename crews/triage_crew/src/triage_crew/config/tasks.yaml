dedup_task:
  description: >
    Call dedup_backlog_cleanup with dry_run=False to remove duplicate
    tasks from the Master Backlog. Keep the oldest copy of each task.
  expected_output: >
    JSON with duplicates_found and tasks_deleted counts.
  agent: triage_agent

estimate_sp_task:
  description: >
    Call bulk_assign_and_estimate to set story points on ALL backlog
    tasks that don't have SP yet and remove assignees from any assigned
    tasks. Backlog items stay unassigned until sprint planning.

    IMPORTANT: Return the EXACT numbers from the tool response.
    Do NOT fabricate, round, or estimate any counts. Copy sp_set,
    already_has_sp, and total_tasks verbatim from the JSON output.
  expected_output: >
    The EXACT JSON returned by bulk_assign_and_estimate — do not
    paraphrase or summarize the numbers.
  agent: triage_agent
  context:
    - dedup_task

scan_task:
  description: >
    Call scan_backlog_for_triage to get a health report of remaining
    issues: wrong priorities, SLA breaches, patterns the AI should analyze.
  expected_output: >
    The scan results JSON for analysis.
  agent: triage_agent
  context:
    - estimate_sp_task

decide_and_execute_task:
  description: >
    Based on the scan results, make INTELLIGENT decisions about:
    1. Priority adjustments — which tasks need escalation based on context
    2. SLA alerts — ONLY for tasks in the active sprint (marked in_sprint=True).
       Backlog items are inventory, not committed work — do NOT create SLA alerts
       for backlog items. Group related sprint breaches, don't spam one per task.
    3. Patterns — identify systemic issues (e.g., "20 HIPAA evidence gaps
       all overdue" is one alert, not 20)
    4. AGING BACKLOG: flag backlog tasks older than 21 days with no updates
       as "aging". For urgent/high priority aging tasks, escalate them into the
       Needs Attention section of the triage summary.
    5. ENGINEER NOTIFICATIONS: For each SLA breach task (in_sprint=True,
       breached=True), call notify_task_assignee(task_id, message) with
       a clear, direct message. Example message:
       "⏰ SLA breach on your sprint task. Please update the task status
       or flag a blocker immediately."
       Skip if the task has no assignee.

    IMPORTANT: Do NOT assign tasks. Do NOT post to Slack channels.
    Call execute_triage_actions first, then notify_task_assignee for each breach.
  expected_output: >
    JSON summary of actions taken with reasoning, including which engineers
    were notified.
  agent: triage_agent
  context:
    - scan_task

post_triage_task:
  description: >
    Post ONE triage summary to {slack_alerts} using post_triage_summary.
    Pass these sections from the previous step's results:
    - priorities_set: bullet list of priority changes
    - assignments: "None — backlog items stay unassigned"
    - story_points: EXACT numbers from estimate task (e.g. "4 tasks
      estimated (318 already had SP)"). Use the real sp_set and
      already_has_sp counts. Do NOT fabricate numbers.
    - alerts: bullet list of alerts created
    - reasoning: why decisions were made

    Post ONE message only. Do NOT post multiple times.
  expected_output: >
    Confirmation of report posted to Slack.
  agent: triage_post_agent
  context:
    - decide_and_execute_task
