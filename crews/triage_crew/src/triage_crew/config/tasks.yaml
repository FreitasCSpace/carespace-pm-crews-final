dedup_task:
  description: >
    Call dedup_backlog_cleanup with dry_run=False to remove duplicate
    tasks from the Master Backlog. Keep the oldest copy of each task.
  expected_output: >
    JSON with duplicates_found and tasks_deleted counts.
  agent: triage_agent

normalize_task:
  description: >
    Call normalize_backlog_tasks to find and fix tasks created directly
    in ClickUp (not from GitHub). These are design tasks from the Buena team.

    Detection: if the task description has NO github.com link, it's a design task.

    The tool automatically:
    - Adds 'design' source tag (instead of 'github')
    - Renames to [TYPE] prefix format matching our nomenclature
    - Adds domain tag if it can infer one from the title

    Tasks that already have a GitHub link in the description are left untouched.
  expected_output: >
    JSON: {tasks_scanned, tasks_normalized, skipped_has_github, details}
  agent: triage_agent
  context:
    - dedup_task

estimate_sp_task:
  description: >
    Call bulk_assign_and_estimate to set story points on ALL backlog
    tasks that don't have SP yet and remove assignees from any assigned
    tasks. Backlog items stay unassigned until sprint planning.

    IMPORTANT: Return the EXACT numbers from the tool response.
    Do NOT fabricate, round, or estimate any counts. Copy sp_set,
    already_has_sp, and total_tasks verbatim from the JSON output.
  expected_output: >
    The EXACT JSON returned by bulk_assign_and_estimate — do not
    paraphrase or summarize the numbers.
  agent: triage_agent
  context:
    - normalize_task

scan_task:
  description: >
    VAULT READ: Call vault_list('sprints/retros') and read the most recent
    retro file. Look for patterns like "carried over auth tasks" or
    "high-SP items always slip" — use these to inform priority decisions
    in the next step. If no retro files exist, proceed without.

    Also call vault_list('triage') and read yesterday's triage report to
    track backlog growth trends (is total_tasks growing or shrinking?).

    Then call scan_backlog_for_triage to get a health report of the backlog:
    wrong priorities, missing SP, unassigned tasks, tag/priority distribution.
  expected_output: >
    The scan results JSON for analysis.
  agent: triage_agent
  context:
    - estimate_sp_task

decide_and_execute_task:
  description: >
    Based on the scan results, make INTELLIGENT decisions about BACKLOG
    HYGIENE ONLY. SLA enforcement is handled by the SLA crew — not here.

    Your scope:
    1. Priority adjustments — which tasks need escalation based on context
       (security tags, HIPAA keywords, crash/data loss in title)
    2. Patterns — identify systemic issues and note them in the summary
    3. AGING BACKLOG: flag backlog tasks older than 21 days with no updates
       as "aging" in the summary — do NOT create alerts for them

    NOT your scope:
    - Creating alerts (SLA crew handles alerts)
    - Sprint SLA breaches
    - Engineer DM notifications
    - Assigning tasks

    IMPORTANT: Do NOT create alerts. Do NOT assign tasks. Do NOT post to Slack.
    Call execute_triage_actions with ONLY set_priority and set_sp actions.
    Do NOT include create_alerts in the actions JSON.
  expected_output: >
    JSON summary of actions taken with reasoning.
  agent: triage_agent
  context:
    - scan_task

post_triage_task:
  description: >
    Post ONE backlog health report to #pm-engineering using post_triage_summary.
    Build the 5 parameters from ALL previous task results:

    backlog_snapshot: one-line totals from scan_task, e.g.:
      '342 tasks | 12 bugs | 45 features | 280 compliance | 5 other'
      Use the EXACT counts from scan results — do NOT estimate.

    hygiene_actions: combine results from dedup, normalize, estimate, and
      decide tasks into a bullet list of what changed, e.g.:
      '• 2 duplicates removed
       • 5 tasks got SP estimates
       • 1 priority adjusted (normal → high: security keyword)'
      If nothing changed across all steps: 'Backlog clean — no actions needed'

    design_tasks: from normalize_task results, e.g.:
      '• 3 design tasks normalized ([TYPE] prefix + design tag added)'
      If tasks_normalized == 0: 'None found'

    aging_items: from scan_task sla_at_risk or aging analysis, list backlog
      tasks older than 21 days with no updates. Include name, priority, age.
      If none: 'None — all items fresh'

    priority_distribution: from scan_task by_priority counts, e.g.:
      'Urgent: 3 | High: 12 | Normal: 280 | Low: 47'

    Post ONE message only. Do NOT post multiple times.

    VAULT WRITE: After posting, call vault_write with:
    - crew: 'triage'
    - content: markdown with frontmatter:
      ---
      date: YYYY-MM-DD
      crew: triage
      type: daily
      total_tasks: N
      duplicates_removed: N
      design_tasks_normalized: N
      sp_estimated: N
      priorities_changed: N
      ---
      ## Backlog Health — YYYY-MM-DD
      - Total: N tasks
      - Distribution: Urgent N | High N | Normal N | Low N
      - Hygiene: what changed
      - Design: N normalized
      - Aging: N items >21d

    Also call vault_write with crew='context', filename='backlog-health.md'
    to overwrite with current backlog snapshot (total tasks, distribution,
    aging count, growth trend vs yesterday).
  expected_output: >
    Confirmation of report posted to Slack and written to vault.
  agent: triage_post_agent
  context:
    - decide_and_execute_task
