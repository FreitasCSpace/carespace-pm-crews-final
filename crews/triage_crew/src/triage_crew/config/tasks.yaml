dedup_task:
  description: >
    Call dedup_backlog_cleanup with dry_run=False to delete duplicate
    tasks in the Master Backlog. Returns count of duplicates found
    and deleted.
  expected_output: >
    JSON with duplicates_found, tasks_deleted, tasks_kept.
  agent: triage_agent

triage_task:
  description: >
    Call batch_triage_backlog to enforce all quality rules on the
    Master Backlog in one pass. Then post summary to #alerts if
    any actions were taken.

    Format: 'Triage: X dupes removed, Y priorities fixed, Z assigned,
    W SLA breaches, V SP estimated.'
  expected_output: >
    JSON summary of all triage actions taken.
  agent: triage_agent
  context:
    - dedup_task
