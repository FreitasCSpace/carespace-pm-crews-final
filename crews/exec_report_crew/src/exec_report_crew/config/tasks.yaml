gather:
  description: >
    Collect data across all dimensions:

    1. Call create_or_get_sprint_list to find the active sprint.
       Use the list_id to pull sprint tasks via get_tasks_by_list.
       Calculate: total tasks, done, in progress, pending, SP progress.

    2. Call batch_compliance_check for compliance task count.

    3. Call get_vanta_compliance_health_summary (MCP tool) for Vanta health.

    4. Pull Active Deals ({active_deals_id}) and At-Risk ({at_risk_deals_id})
       via get_tasks_by_list for GTM health.

    5. Pull Alerts list ({alerts_id}) via get_tasks_by_list.
       Count open alerts, check for stale >{ticket_stale_hours}h.

    6. Count bugs in Master Backlog ({master_backlog_id}) — filter for 'bug' tag.

    7. Identify top 3 risks and wins of the week.
  expected_output: >
    Complete data JSON with all dimensions.
  agent: exec_reporter_agent

write_and_post:
  description: >
    Compile and post the executive report using post_executive_report
    (NOT the generic post tool). Pass these 5 parameters:

    health_dashboard: Traffic light per dimension, e.g.:
    "🟢 Engineering: Sprint 80% complete (36/45 SP)
    🟡 GTM: 2 deals at risk, pipeline needs attention
    🔴 Compliance: RED — 16 failing controls, BAA gaps
    🟡 Customer Success: Onboarding list empty
    🟢 Bug Health: 0 open bugs"

    sprint_status: Sprint progress, e.g.:
    "Sprint 1 — Mar 23 to Apr 05
    • 3 done, 5 in progress, 2 pending
    • 36/45 SP delivered (80%)"

    compliance: Compliance summary, e.g.:
    "Vanta: RED | 268 open tasks | 16 failing controls
    • BAA gaps: Azure, Google Workspace
    • Evidence gaps: 20+ HIPAA items overdue"

    risks: Top 3 risks, e.g.:
    "1. HIPAA evidence gaps blocking audit readiness — Owner: Luis
    2. Stale PR #36 (35d) blocking onboarding feature — Owner: binunexturn
    3. MFA enforcement gaps in Google Workspace — Owner: IT"

    wins: Wins, e.g.:
    "• Vendor risk task for Azure completed
    • All CI checks passing
    • Sprint populated with 10 tasks"

    IMPORTANT: Use post_executive_report for formatted output.
  expected_output: >
    Confirmation of Slack post.
  agent: exec_reporter_agent
  context:
    - gather
