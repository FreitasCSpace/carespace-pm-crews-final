gather:
  description: >
    Collect data across all dimensions:

    1. ENGINEERING: Pull current sprint tasks, calculate completion %, velocity,
       stale tasks. Check Sprint History (901326439238) for trend.
    2. GTM: Pull Active Deals (901326439255) and At-Risk (901326439258).
       Count deals at risk, estimate pipeline value.
    3. COMPLIANCE: Call get_vanta_compliance_health_summary (MCP tool). Count failing controls.
    4. CUSTOMER SUCCESS: Check Onboarding & Accounts (901326439266) for churn risk.
    5. BUG HEALTH: Pull Master Backlog (901326439232) tasks tagged 'bug'.
       Count open bugs, calculate average age, find SLA breaches.
    6. CREW HEALTH: Check Alerts list (901326439234) for stale alerts (>48h),
       verify alerts exist in last 7 days (if none, crews may not be running).
       Check backlog data quality: tasks missing priority, assignee, description.
    7. MARKETING: Check Content & Campaigns (901326439261) for overdue items.
       Check Product Launches (901326439262) for launches within 14 days.
    8. Identify top 3 risks and wins of the week.
  expected_output: >
    JSON with all dimensions: engineering_health, gtm_health, compliance_health,
    cs_health, bug_health, crew_health, marketing_status, top_risks, wins.
    Each health dimension includes a GREEN/YELLOW/RED score.
  agent: exec_reporter_agent

write_and_post:
  description: >
    Create the weekly executive report:

    1. For product launches <=14 days away without GTM checklist, create
       checklist tasks in Master Backlog (901326439232) tagged
       ['marketing', 'launch']: press release, sales deck, demo script,
       partner notification. Check duplicates first.

    2. Write report to ClickUp Docs (Crew Dashboard: xnum1-9353) with:
       - Health Dashboard table (5 dimensions with scores)
       - Sprint Status section
       - GTM Pipeline highlights
       - Compliance snapshot
       - Crew & System Health
       - Marketing status
       - Top 3 Risks (with owner and mitigation)
       - Wins This Week

    3. Log a velocity/health data point in Sprint History (901326439238).

    4. Post summary to #pm-exec-updates using post_exec tool.
       If any crew health issues found, also post to #pm-engineering.
  expected_output: >
    Confirmation with doc URL and Slack post status.
  agent: exec_reporter_agent
  context:
    - gather
