gather:
  description: >
    NOTE: Vault context is in your inputs as vault_context. Use it for trends
    ("compliance has been red for 5 straight days", "backlog grew 15% this week").

    Collect data across all business areas. Remember: the CEO reading this
    report is NOT technical. Translate everything into business language.

    1. ENGINEERING PROGRESS
       Call create_or_get_sprint_list then get_tasks_by_list.
       Report: what % of this sprint's work is done, what's in progress,
       what's blocked. Show each engineer's workload in plain terms:
       "Fabiano is working on fixing a security access control issue (high priority)."
       NOT: "Fabiano: RBAC Guards (8 SP, urgent) + Auth middleware (5 SP) = 13 SP"

    2. COMPLIANCE & SECURITY HEALTH
       Call batch_compliance_check for the full picture.
       Translate into business impact:
       - Instead of "45% pass rate" say "we're passing less than half our
         security checks (45 out of 100) — target is 95 out of 100"
       - Instead of "BAA missing" say "we still need privacy agreements with
         Azure and Google before we can legally handle patient data"
       - Instead of "SOC 2 failing" say "our security certification is not
         ready, which blocks us from closing enterprise deals"
       - Explain what "critical controls" means: "these are the security
         requirements we MUST pass"

    3. SALES PIPELINE
       Pull Active Deals ({active_deals_id}) and At-Risk ({at_risk_deals_id}).
       Report: how many deals, total value, any at risk and why.

    4. BACKLOG HEALTH
       Call scan_backlog_for_sprint for a breakdown.
       Report totals in plain language: "398 items in our to-do list:
       25 new features, 13 bugs to fix, 294 compliance items, 66 other tasks."
       For bugs: flag how many are urgent or overdue.

    5. SYSTEM HEALTH
       Pull Alerts list ({alerts_id}). If no alerts in 7 days, flag that
       our automated monitoring may not be running.

    6. WINS — things going well, framed as business outcomes.
       NOT "sprint populated" but "team is fully assigned and ready to deliver."

    7. RISKS — ranked by business impact. For each risk, answer:
       - What's happening? (plain English)
       - So what? (business consequence: revenue, legal, customer impact)
       - Who's responsible?
       - What should we do about it? (specific action)

    8. DECISIONS THE CEO NEEDS TO MAKE THIS WEEK
       Vendor escalations, hiring/resourcing, policy approvals, strategic calls.
  expected_output: >
    Complete business-friendly analysis with plain-language risks, wins,
    and clear decisions needed from the CEO. No engineering jargon.
  agent: exec_reporter_agent

write_and_post:
  description: >
    Post the executive report using post_executive_report (NOT the generic post tool).
    The CEO reads this report. Write in PLAIN BUSINESS ENGLISH — no code references,
    no ticket IDs, no engineering abbreviations.

    LANGUAGE RULES:
    - Say "story points (our sprint work units)" on first mention, then just "points" after.
    - Never write ticket IDs like "admin#80" or "carespace-ui#159".
    - Never use abbreviations without explanation: SP, SLA, RBAC, BAA, SOC 2, PR, venv.
    - Write risks as: "What's the problem → What does it mean for the business → Who → Next step"
    - Use conversational professional tone, not a database dump.

    Pass ALL 8 parameters:

    health_dashboard: one-line traffic light per area, e.g.:
    "🔴 Engineering: not started yet | 🟢 Sales: pipeline healthy | 🔴 Compliance: only 45% of security checks passing | 🟡 Support: no data | 🟢 Bugs: under control"

    key_metrics: 4-5 headline numbers in context, e.g.:
    "• Sprint work: 0 of 46 points delivered — sprint starts Monday
     • To-do list: 350 items (25 features, 12 bugs, 282 compliance fixes, 11 other)
     • Security & compliance: passing 45% of checks, need 95% — 13 critical items failing
     • Sales pipeline: no deals at risk
     • Automated systems: intake, triage, and daily standup running on their own"

    sprint_analysis: what the team is working on in plain language, e.g.:
    "Sprint 1 runs Mar 30 to Apr 12 (starts Monday)
     Nothing delivered yet — sprint hasn't started.

     Team assignments:
     — Fabiano: fixing a security access control issue (high priority, 8 points)
     — Bharath: production readiness review (8 points)
     — Andre: building cover image features and pre-existing conditions form (15 points)
     — Sandeep: connecting our compliance monitoring tool (5 points)
     — Luis: gathering employee exit compliance evidence (5 points)

     Watch out: the security fix is urgent and can't slip past this sprint."

    compliance: plain-English compliance status, e.g.:
    "Security health: RED — we're only passing 45% of our security checks (target: 95%)

     What this means:
     • 13 critical security requirements are failing — until these are fixed,
       we cannot pass our security certification (needed for enterprise sales)
     • We're missing required privacy agreements with Azure and Google — without
       these, we cannot legally handle patient health data
     • Over 20 privacy evidence items are overdue — this creates legal exposure
       if there's ever a data breach investigation
     • 282 compliance fixes are waiting in our backlog (our biggest category)

     Bottom line: enterprise sales are blocked until our security audit is clean,
     and patient data handling has legal risk until vendor agreements are signed."

    gtm: sales pipeline in plain terms, e.g.:
    "• No active deals at risk — pipeline is healthy
     • No product launches in the next 2 weeks"

    risks: top risks in plain language, e.g.:
    "1. 🔴 Missing vendor privacy agreements (Azure + Google)
        We can't legally process patient data through these vendors without signed
        agreements. This creates HIPAA violation exposure.
        Owner: Luis Freitas
        Next step: You (CEO) need to escalate to our Azure and Google account reps this week.

     2. 🔴 Security certification not ready (only 45% of checks passing)
        We need this certification to close enterprise deals. 13 critical requirements
        are failing, and 12 of them don't have anyone assigned to fix them.
        Owner: Luis + Sandeep
        Next step: Dedicate engineering time to compliance fixes this sprint.

     3. 🔴 Access controls not working correctly
        There's a security issue where the system grants access to everyone regardless
        of their role. This is a vulnerability that needs immediate patching.
        Owner: Fabiano
        Next step: Must be fixed this sprint — it's the #1 priority."

    wins: good news in business terms, e.g.:
    "• Engineering team is fully assigned and ready to start the sprint Monday
     • Our AI project management system is running daily without manual intervention
     • No sales deals are at risk — clean pipeline heading into the sprint"

    decisions_needed: what the CEO needs to act on, e.g.:
    "• Privacy agreements: you need to contact our Azure and Google account reps
       to get vendor privacy agreements signed — this is blocking patient data work
     • Compliance staffing: Sandeep is overloaded with both infrastructure and
       compliance work — consider whether we need additional help"

    IMPORTANT:
    - Call post_executive_report EXACTLY ONCE with all 8 parameters.
    - When it returns ok:true, stop. Do NOT call it again.
    - Do NOT use the generic 'post' tool.
    - Write for a non-technical CEO. If your grandmother wouldn't understand it, rewrite it.

    Do NOT call vault_write — vault is handled automatically by the system.
  expected_output: >
    Confirmation of Slack post.
  agent: exec_reporter_agent
  context:
    - gather
