fetch_and_summarize:
  description: >
    Fetch TODAY's huddle notes from Slack and produce a structured summary.
    Historical huddles are already in the vault — only fetch new ones.

    Call fetch_huddle_notes with lookback_hours=24.

    For each huddle found, produce a clean structured markdown summary:

    ## Huddle — YYYY-MM-DD

    **Attendees:** Name1, Name2, Name3

    **Summary:** 3-5 sentences of what was discussed.

    **Key Topics:**
    - Topic 1
    - Topic 2

    **Action Items:**
    - Name: what they committed to do

    **Decisions:**
    - What the team agreed on

    **Blockers:**
    - Issues raised that need resolution

    If no huddle notes found, return "No recent huddles."
    Do NOT fabricate content. Only extract what is explicitly in the notes.
    The tool resolves Slack user IDs to real names automatically.

    Do NOT call vault_write — vault is handled automatically by the system.
  expected_output: >
    Structured markdown summary of today's huddle with date, attendees,
    summary, topics, actions, decisions, and blockers.
  agent: huddle_agent
