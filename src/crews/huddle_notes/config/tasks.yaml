fetch_and_summarize:
  description: >
    Call fetch_huddle_notes to retrieve recent huddle notes from Slack.
    The tool searches both Slack file archives and channel history
    in #carespace-team for the last 72 hours.

    For each huddle found, produce a clean structured summary:

    1. Date and time of the huddle
    2. Attendees (names from the huddle notes)
    3. Summary — 3-5 sentence overview of what was discussed
    4. Key topics — bullet list of main discussion points
    5. Action items — who committed to doing what
    6. Decisions — what the team agreed on
    7. Blockers — issues raised that need resolution

    If no huddle notes found, return "No recent huddles."
    Do NOT fabricate content. Only extract what is explicitly in the notes.

    The output will be written to the vault automatically by the system.
    Do NOT call vault_write yourself.
  expected_output: >
    Structured markdown summary of each huddle with date, attendees,
    summary, topics, actions, decisions, and blockers.
  agent: huddle_agent
