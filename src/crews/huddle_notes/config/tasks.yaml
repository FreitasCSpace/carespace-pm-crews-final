fetch_and_summarize:
  description: >
    Huddle notes have been pre-fetched and are available in your inputs
    as huddle_data. Read it and produce a structured markdown summary.

    If huddle_data shows huddles_found == 0, return "No recent huddles."

    For each huddle found, read the canvas_content field and produce:

    ## Huddle — YYYY-MM-DD

    **Attendees:** Name1, Name2, Name3

    **Summary:** 3-5 sentences of what was discussed.

    **Key Topics:**
    - Topic 1
    - Topic 2

    **Action Items:**
    - Name: what they committed to do

    **Decisions:**
    - What the team agreed on

    **Blockers:**
    - Issues raised that need resolution

    Do NOT fabricate content. Only extract what is explicitly in the notes.
    User names are already resolved — use them as-is.

    Do NOT call any tools. All data is already in your inputs.
    Do NOT call vault_write — vault is handled automatically by the system.
  expected_output: >
    Structured markdown summary of today's huddle with date, attendees,
    summary, topics, actions, decisions, and blockers.
  agent: huddle_agent
