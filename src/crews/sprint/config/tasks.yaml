check_candidates_task:
  description: >
    FIRST check if there are candidates to finalize.

    Call list_sprint_candidates to see what the team has selected.
    Call get_last_sprint_velocity for the recommended SP budget.

    Report: candidate count, total SP, recommended budget, over/under delta.

    If Sprint Candidates is EMPTY: set a flag that sprint planning
    cannot proceed. The team needs to populate Sprint Candidates first.
  expected_output: >
    Sprint Candidates summary: count, SP total, budget, assignment status.
    Or: "Sprint Candidates is empty — sprint planning cannot proceed."
  agent: sprint_agent

finalize_task:
  description: >
    IF check_candidates_task found candidates (count > 0):
      1. Call create_or_get_sprint_list to get/create the sprint.
      2. Call finalize_sprint_from_candidates with the sprint list_id.
         This moves ALL candidates into the sprint.
      3. Report: tasks_moved, total_sp, warnings.

    IF Sprint Candidates was EMPTY:
      Do NOT create a sprint. Do NOT call create_or_get_sprint_list.
      Do NOT call finalize_sprint_from_candidates.
      Return: "No sprint created — Sprint Candidates is empty.
      The team needs to add tasks to Sprint Candidates before
      the sprint can be planned."
  expected_output: >
    JSON with tasks_moved, total_sp, warnings. Or empty candidates message.
  agent: sprint_agent
  context:
    - check_candidates_task

post_sprint_plan_task:
  description: >
    Post ONE message to #pm-sprint-board.

    IF a sprint was finalized (tasks_moved > 0):
      Call post_sprint_plan(sprint_list_id=<list_id from finalize_task>).
      The tool fetches sprint name and tasks from ClickUp.

    IF Sprint Candidates was empty (no sprint created):
      Use the generic post tool to post to {slack_sprint}:
      "Sprint not planned — Sprint Candidates is empty.
       The team needs to add tasks to Sprint Candidates
       before the next sprint can be finalized."

    Post ONE message only. Do NOT call vault_write.
  expected_output: >
    Confirmation of Slack post.
  agent: sprint_post_agent
  context:
    - finalize_task
