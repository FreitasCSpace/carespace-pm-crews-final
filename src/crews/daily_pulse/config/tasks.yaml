find_sprint_task:
  description: >
    Call create_or_get_sprint_list to find the active sprint.
    Returns sprint list_id, name, start date, end date, and pre-calculated timing.
  expected_output: >
    JSON with list_id, sprint_name, start_date, end_date, timing, status.
  agent: daily_pulse_agent

scan_and_gather:
  description: >
    NOTE: Vault context from previous daily pulses and velocity history
    is available in your inputs as vault_context. Use it to calculate
    deltas vs yesterday if available.

    Gather ALL data needed for the daily sprint digest:

    1. Pull sprint tasks using get_tasks_by_list (include_closed=True).
       For each task note: name, STATUS (exact ClickUp status), assignee,
       SP, last updated, tags, and URL (clickup link for each task).

    2. Sprint timing:
       The sprint tool returns a pre-calculated "timing" object.
       Use timing.timing_display EXACTLY as returned — do NOT
       recalculate dates yourself. Examples:
       * "Starts in 3 days (Mar 23 — Apr 05)" — sprint not started
       * "Day 5 of 14 (9 days remaining)" — sprint in progress
       Use timing.sprint_started to know if the sprint is active.

    3. Task counts by LITERAL ClickUp status (not your interpretation):
       * done: tasks with status 'complete' or 'done'
       * in_progress: tasks with status 'in progress'
       * blocked: tasks with status 'blocked' ONLY
       * pending: tasks with status 'to do' or 'open'
       CRITICAL: A task is "blocked" ONLY if its ClickUp status says
       "blocked". Do NOT infer blocked status from the task name or
       content. A compliance task in "to do" status is PENDING, not blocked.

    4. SP progress: completed_sp / total_sp

    5. Sprint risk assessment (only when timing.sprint_started is true):
       time_pct = elapsed_days / total_days
       done_pct = done_sp / total_sp
       If done_pct < (time_pct - 0.15): 🔴 Behind schedule
       If done_pct < (time_pct - 0.05): 🟡 At risk
       Otherwise: 🟢 On track
       If sprint hasn't started: status = "Not yet started"

    6. Identify sprint risks — items that may not complete on time:
       - High-SP tasks (8+ SP) still in pending with sprint >50% elapsed
       - Tasks with no assignee
       - Tasks with external dependencies (keywords: 'waiting on',
         'blocked by', 'depends on', 'need from' in descriptions)
       - Urgent/critical priority tasks still pending late in sprint
       These are RISKS, not blockers. They go in the Sprint Risks section.

    7. Find stale sprint tasks using check_stale_sprint_tasks tool.
       Pass all non-done sprint task IDs as a JSON array and days=3.
       This checks actual ClickUp COMMENTS, not date_updated (which
       gets bumped by bot activity like triage SP estimates).
       A task with no human comments for 3+ days is truly stale.
       Flag them in Needs Attention.

    8. PR COVERAGE: For each sprint task that is "in progress" or "to do",
       check if there's an open PR linked to it. Call get_open_pull_requests
       (empty repo = all repos) and cross-reference PR titles/branches with
       sprint task names and GitHub issue references in the task description.
       For each sprint task, determine:
       - Has PR: yes/no
       - If yes: PR status (open, draft, passing CI, failing CI)
       - If "in progress" but NO PR: flag as a risk — work may not be tracked
       Report this as a "PR Coverage" sub-section in Needs Attention.

    9. Check GitHub: stale PRs (>{stale_pr_days}d) using get_stale_pull_requests.
       IMPORTANT: Only include PRs that are RELATED to sprint tasks.
       No "critical stale PRs" category — sprints are 2 weeks.
       Cross-reference PR titles/branches with sprint task names.
       If a PR doesn't match any sprint task, SKIP it.
       If the sprint is empty, skip stale PR reporting entirely.

    10. Check CI using get_ci_status on repos:
        {ci_check_repos}.
        NOTE: Try 'main' first, if 404 try 'master'.
        IMPORTANT: Only report FAILING CI checks. Do NOT include passing repos.
        If all repos pass, just note "All CI passing" — don't list them individually.
        For failures, include the GitHub Actions link:
        https://github.com/carespace-ai/<repo>/actions

    11. Check for stale GitHub issues using get_stale_issues, BUT only
        report issues that match a CURRENT SPRINT task name. Cross-reference
        the issue titles with sprint task names. If an issue doesn't match
        any sprint task, SKIP it. If the sprint is empty, skip entirely.
        These are sprint-related issues with no comments for >{stale_task_days}d.

    If the sprint list exists but has NO tasks yet (empty sprint):
    Report "Sprint is empty — no tasks assigned yet" and skip all
    task-level reporting (done/in-progress/blocked/pending/risks).
    Only report CI status in that case.

    IMPORTANT: NEVER scan or report on the Master Backlog. The daily
    pulse ONLY covers the current sprint list. Backlog items are not
    sprint items.
  expected_output: >
    Complete data JSON for digest compilation.
  agent: daily_pulse_agent
  context:
    - find_sprint_task

compile_and_post:
  description: >
    Compile the data into a STRUCTURED SPRINT DIGEST and post to
    #pm-standup. This is the ONLY channel daily pulse posts to.

    FORMAT THE STANDUP AS FOLLOWS (use this exact structure):

    ═══════════════════════════════════
    📊 EXECUTIVE SUMMARY
    ═══════════════════════════════════
    • Sprint N — {timing.timing_display} (copy EXACTLY from tool output)
    • Progress: Z% complete (A/B SP delivered)
    • Status: [🟢 On Track / 🟡 At Risk / 🔴 Behind / 🟢 Not yet started]
    • [Key risk or win in one line]

    SPRINT STATUS RULES:
    If timing.sprint_started is false: status = "🟢 Not yet started"
    If timing.sprint_started is true:
      🟢 On Track — done% is within 5% of time elapsed%
      🟡 At Risk — done% is 5-15% behind time elapsed%
      🔴 Behind — done% is >15% behind time elapsed%

    CRITICAL: Use timing.timing_display for the sprint timing line.
    Do NOT calculate dates yourself — the tool already did the math.

    ═══════════════════════════════════
    📋 SPRINT STATUS (literal ClickUp status)
    ═══════════════════════════════════

    ✅ Done:
    • <clickup_url|Task name> — @assignee · X SP
    If no tasks are done, SKIP this sub-section entirely.

    🔄 In Progress:
    • <clickup_url|Task name> — @assignee · X SP
    If no tasks in progress, SKIP this sub-section entirely.

    🚫 Blocked:
    • <clickup_url|Task name> — @assignee · Reason
    ONLY tasks whose ClickUp STATUS field is literally 'blocked'.
    If no tasks have blocked status, SKIP this entire sub-section.
    Do NOT show "Blocked: None".

    ⏳ To Do:
    • <clickup_url|Task name> — @assignee · X SP

    FORMAT RULES for task lines:
    - Use Slack link format: <https://app.clickup.com/t/TASKID|Task Name>
    - Use the task URL from get_tasks_by_list output
    - Drop the [TYPE] prefix — just use the clean task name
    - Drop the GitHub issue reference (carespace-repo#N) — not useful here
    - Use · (middle dot) to separate assignee and SP, not parentheses
    - Keep each line short and scannable

    ═══════════════════════════════════
    ⚠️ NEEDS ATTENTION
    ═══════════════════════════════════
    This section is a flat bullet list. ONLY show items that have problems.
    Do NOT show sub-section headers. Do NOT show "None" for empty categories.
    If nothing needs attention, just write: "All clear ✅"

    Each item gets a single emoji prefix to indicate type:
    • 😴 = stale task (no activity 3+ days)
    • 🔀 = missing PR (in progress but no code tracked)
    • 🐌 = stale PR (open >{stale_pr_days}d)
    • 🔴 = CI failing
    • 💬 = stale issue (no comments 3+ days)

    Examples:
    • 😴 <clickup_url|Task name> — @assignee · 5d no activity
    • 🔀 <clickup_url|Task name> — @kishorkumar · in progress, no PR
    • 🐌 <github_pr_url|PR title> — 9d old
    • 🔴 <github_actions_url|carespace-admin> — CI failing
    • 💬 <clickup_url|Task name> — 9d no comments

    If ALL CI is passing, add one line: ✅ All CI passing
    Do NOT add lines for categories with zero items.

    RULES:
    - Stale PRs: only sprint-related PRs. Skip unrelated.
    - Missing PR: only flag "in progress" tasks. "To do" tasks don't need PRs yet.
    - Stale issues: only issues matching sprint task names. Use ClickUp URL.
    - No "Critical Stale PRs" category — sprints are 2 weeks, not applicable.

    ═══════════════════════════════════
    ⚡ SPRINT RISKS
    ═══════════════════════════════════
    Items that may not complete before sprint ends. Include:
    - High-SP tasks still pending with sprint >50% elapsed
    - Tasks with external dependencies
    - Urgent tasks not yet started late in sprint
    - Unassigned tasks

    For EACH risk:
    • ⚡ <clickup_url|Task name> — @assignee · X SP
      → Risk + action on one line

    Example:
    • ⚡ <https://app.clickup.com/t/abc|Calendar Program UI> — unassigned · 5 SP
      → Unassigned, sprint starts in 3 days — assign during sprint planning

    If sprint hasn't started or no risks identified, skip this section.

    ═══════════════════════════════════
    🎯 MEETING MODE
    ═══════════════════════════════════
    Based on sprint risks and blocked tasks:

    If risks or blocked tasks exist:
    🔴 STANDUP MODE: X risk(s) to discuss. 15-min focused session.

    If no risks and no blocked tasks:
    🟢 OPEN SLOT: Sprint healthy. Available for strategic discussion.

    Do NOT list the risks again here — the Sprint Risks section above
    already has the full details. Meeting Mode is just the headline.

    POST using post_standup tool with these parameters:
    - executive_summary: 3-4 bullets (sprint timing, progress, status)
    - done: completed tasks (or 'None')
    - in_progress: active tasks with @assignee (X SP) (or 'None')
    - blocked: ONLY tasks with ClickUp status 'blocked' (or 'None')
    - pending: not-started tasks with @assignee (X SP)
    - attention: stale sprint tasks (3d+ no activity), PR coverage gaps,
        sprint-related stale PRs, CI failures, sprint-related stale issues
    - meeting_mode: just the headline, e.g.:
        '🔴 STANDUP MODE: 3 risks to discuss. 15-min focused session.'
        OR '🟢 OPEN SLOT: Sprint healthy. Available for strategic discussion.'
    - blocker_details: sprint risks breakdown (items at risk of not
      completing, external deps, unassigned urgent tasks).
      Empty string if no risks.

    IMPORTANT: Do NOT add separator lines (═══) or section headers.
    The tool adds all formatting automatically. Just pass clean content.

    IMPORTANT: Post ONLY to #pm-standup using post_standup.
    Do NOT post to any other channel.

    Do NOT call vault_write — vault is handled automatically by the system.
  expected_output: >
    Confirmation of standup posted to {slack_standup}.
  agent: daily_pulse_agent
  context:
    - scan_and_gather
