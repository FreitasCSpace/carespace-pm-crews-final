analyze_sprint:
  description: >
    CRITICAL: ALL sprint data is pre-gathered in your inputs as sprint_data.
    You MUST use ONLY this data. Do NOT invent, hallucinate, or fabricate
    any task names, assignees, SP values, or statuses.

    If sprint_data.tasks has 1 task, report 1 task. If it has 0, report 0.
    NEVER add fake tasks to make the report look more complete.

    Parse sprint_data JSON and extract:

    1. Sprint info from sprint_data.sprint (name, timing, dates)
    2. Tasks from sprint_data.tasks — use EXACT names, statuses, assignees, SP, URLs
    3. Stale tasks from sprint_data.stale_tasks
    4. Open PRs from sprint_data.open_prs (for PR coverage)
    5. Stale PRs from sprint_data.stale_prs

    Task counts by LITERAL ClickUp status:
    * done: status 'complete' or 'done'
    * in_progress: status 'in progress'
    * blocked: status 'blocked' ONLY
    * pending: status 'to do' or 'open'

    SP progress: sum SP of done tasks / sum SP of all tasks

    Sprint timing: use sprint_data.sprint.timing.timing_display EXACTLY.

    If sprint has NO tasks: report "Sprint is empty — no tasks assigned."

    Do NOT post to Slack. Do NOT call post_standup. The next task handles posting.
  expected_output: >
    Analysis based ONLY on sprint_data. Every task name, SP, and status
    must come from the actual data. Zero fabricated content.
  agent: daily_pulse_agent

compile_and_post:
  description: >
    Post ONE sprint digest to #pm-standup using post_standup.
    Use ONLY the analysis from the previous task. Do NOT add tasks
    that weren't in the analysis.

    FORMAT:

    executive_summary: 3-4 bullets
    • Sprint N — timing_display (EXACT from sprint data)
    • Progress: X% complete (A/B SP delivered)
    • Status: green/yellow/red based on progress vs time
    • Key risk or win in one line

    done/in_progress/blocked/pending: task lists using this format:
    • <clickup_url|Task name> — @assignee · X SP
    Drop [TYPE] prefix. Use middle dot separator. Skip empty sections.

    attention: unified Task Health — each problematic task listed ONCE:
    • <clickup_url|Task name> — @assignee · X SP · status
      - issue 1
      - issue 2

    meeting_mode: headline only
    🔴 STANDUP MODE: N task(s) need attention.
    OR 🟢 OPEN SLOT: Sprint healthy.

    blocker_details: empty string

    CRITICAL: Call post_standup EXACTLY ONCE. When ok:true, STOP.
    Do NOT call vault_write.
  expected_output: >
    Confirmation of standup posted.
  agent: daily_pulse_agent
  context:
    - analyze_sprint
