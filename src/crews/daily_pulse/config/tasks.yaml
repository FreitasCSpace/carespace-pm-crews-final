confirm_post:
  description: >
    The sprint digest has already been posted to Slack by the system.
    Return a confirmation based on the data below.
    Do NOT call any tools. Do NOT post anything.

    --- DIGEST STATUS ---
    Posted: {digest_posted}
    Summary: {digest_summary}
    --- END STATUS ---
  expected_output: >
    Confirmation that the digest was posted, including the summary.
  agent: daily_pulse_agent
