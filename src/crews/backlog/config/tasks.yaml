intake_scan:
  description: >
    Call batch_import_engineering to import GitHub issues into ClickUp.
    Do NOT post to Slack — the final task handles all posting.
    Return the JSON summary with tasks_created, duplicates_skipped,
    repos_scanned, issues_found, errors, and sample_created.
  expected_output: >
    JSON summary from batch_import_engineering.
  agent: backlog_importer_agent

close_sync:
  description: >
    Call sync_closed_issues ONCE to two-way sync GitHub↔ClickUp.
    Do NOT post to Slack — the final task handles all posting.
    Return the JSON summary with clickup_closed, clickup_reopened,
    backlog_scanned, github_tasks_found.
  expected_output: >
    JSON summary from sync_closed_issues.
  agent: backlog_importer_agent
  context:
    - intake_scan

scan_task:
  description: >
    Call scan_backlog_for_triage to get backlog health.
    Returns: total_tasks, bugs, features, compliance, tasks (type counts),
    by_priority, unassigned, no_story_points, aging, wrong_priority.
    Do NOT post to Slack.
  expected_output: >
    The scan results JSON.
  agent: backlog_analyst_agent
  context:
    - close_sync

decide_and_execute_task:
  description: >
    Based on the scan results, make priority adjustment decisions.

    Your scope:
    1. Priority adjustments — security tasks, crash/data loss bugs
    2. Patterns — identify systemic issues
    3. Aging items — flag tasks >21 days without updates

    NOT your scope: creating alerts, assigning tasks, renaming Vanta tasks.

    Call execute_triage_actions with ONLY set_priority and set_sp actions.
    Do NOT post to Slack.
  expected_output: >
    JSON summary of actions taken.
  agent: backlog_analyst_agent
  context:
    - scan_task

post_report:
  description: >
    Post ONE combined backlog report to {slack_engineering} using
    post_triage_summary. This is the ONLY Slack post for the entire
    backlog crew run. Combine ALL results from previous tasks.

    Build the 5 parameters using EXACT numbers from tool outputs:

    backlog_snapshot: Use the scan_task results directly:
      '{total_tasks} tasks | {bugs} bugs | {features} features | {compliance} compliance | {tasks} other'
      These counts come from scan_backlog_for_triage output fields:
      total_tasks, bugs, features, compliance, tasks.

    hygiene_actions: Combine {hygiene_stats} from inputs + intake + sync + decide results:
      '• Import: X new tasks (Y skipped across Z repos)
       • Sync: A closed, B reopened (C total synced)
       • Dedup: D duplicates removed
       • SP: E tasks estimated
       • Priorities: F adjusted'
      Only include lines where the count > 0. If nothing changed: 'All clean'

    design_tasks: from {hygiene_stats} normalize section:
      '• N design tasks normalized'
      If tasks_normalized == 0: 'None found'

    aging_items: from scan_task aging list:
      Name — priority — Xd since update
      If none: 'None — all items fresh'

    priority_distribution: from scan_task by_priority:
      'Urgent: X | High: Y | Normal: Z | Low: W'
      Use EXACT numbers from by_priority dict. If a priority has 0, still show it.

    CRITICAL: Use the EXACT numbers from the tool outputs. Do NOT estimate,
    round, or fabricate counts. If scan says 127 total_tasks, write 127.

    Post ONE message only. Do NOT call post or any other Slack tool.
    Do NOT call vault_write.
  expected_output: >
    Confirmation of report posted to Slack.
  agent: backlog_post_agent
  context:
    - intake_scan
    - close_sync
    - decide_and_execute_task
