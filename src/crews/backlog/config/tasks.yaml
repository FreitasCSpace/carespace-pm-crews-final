intake_scan:
  description: >
    Call batch_import_engineering to import GitHub issues into ClickUp.
    Do NOT post to Slack — the final task handles all posting.
    Return the JSON summary with tasks_created, duplicates_skipped,
    repos_scanned, issues_found, errors, and sample_created.
  expected_output: >
    JSON summary from batch_import_engineering.
  agent: backlog_importer_agent

close_sync:
  description: >
    Call sync_closed_issues ONCE to two-way sync GitHub↔ClickUp.
    Do NOT post to Slack — the final task handles all posting.
    Return the JSON summary with clickup_closed, clickup_reopened,
    backlog_scanned, github_tasks_found.
  expected_output: >
    JSON summary from sync_closed_issues.
  agent: backlog_importer_agent
  context:
    - intake_scan

scan_task:
  description: >
    Call scan_backlog_for_triage to get backlog health.
    Returns: total_tasks, bugs, features, compliance, tasks (type counts),
    by_priority, unassigned, no_story_points, aging, wrong_priority.
    Do NOT post to Slack.
  expected_output: >
    The scan results JSON.
  agent: backlog_analyst_agent
  context:
    - close_sync

decide_and_execute_task:
  description: >
    Based on the scan results, make priority adjustment decisions.

    Your scope:
    1. Priority adjustments — security tasks, crash/data loss bugs
    2. Patterns — identify systemic issues
    3. Aging items — flag tasks >21 days without updates

    NOT your scope: creating alerts, assigning tasks, renaming Vanta tasks.

    Call execute_triage_actions with ONLY set_priority and set_sp actions.
    Do NOT post to Slack.
  expected_output: >
    JSON summary of actions taken.
  agent: backlog_analyst_agent
  context:
    - scan_task

post_report:
  description: >
    Post ONE combined backlog report to {slack_engineering} using
    post_triage_summary. This is the ONLY Slack post for the entire
    backlog crew run. Combine ALL results from previous tasks.

    Build the 5 parameters using EXACT numbers from tool outputs:

    backlog_snapshot: Use scan_task results directly:
      '{total_tasks} tasks | {bugs} bugs | {features} features | {compliance} compliance | {design} design | {tasks} tasks'
      Use the EXACT fields: total_tasks, bugs, features, compliance, design, tasks.

    hygiene_actions: DETAILED item-level transparency. List every action performed.
      Combine {hygiene_stats} from inputs + intake + sync + decide results.

      For import (from intake_scan sample_created):
      If tasks_created > 0, list each with clickable links:
        'New tasks imported:
         • <clickup_url|Issue title> — priority (<github_url|GitHub>)
         • <clickup_url|Issue title> — priority (<github_url|GitHub>)'
      If tasks_created == 0: 'No new issues (X skipped across Y repos)'

      For sync (from close_sync closed_tasks/reopened_tasks):
      If clickup_closed > 0, list each with links:
        'Closed (GitHub → ClickUp):
         • <clickup_url|Task name> (<github_url|GitHub>)'
      If clickup_reopened > 0:
        'Reopened (GitHub → ClickUp):
         • <clickup_url|Task name> (<github_url|GitHub>)'
      If no changes: 'Sync: all N tasks in sync'

      For dedup (from {hygiene_stats}.dedup):
      If tasks_deleted > 0: 'Dedup: X duplicates removed'

      For SP estimation (from {hygiene_stats}.estimate):
      If sp_set > 0: 'SP estimated: X tasks'

      For priority adjustments (from decide_and_execute_task priority_details):
      List each with clickable link:
        'Priority adjusted:
         • <clickup_url|Task name> → new_priority (reason)'

      If NOTHING happened across all steps: 'All clean — no actions needed'

      FORMAT RULE: All item references must use Slack link format:
      <https://app.clickup.com/t/TASKID|Display Name> for ClickUp tasks
      <https://github.com/org/repo/issues/N|GitHub> for GitHub issues

    design_tasks: from {hygiene_stats}.normalize:
      If tasks_normalized > 0, list each:
        '• Task name — tagged as design'
      If 0: 'None found'

    aging_items: from scan_task aging list:
      List each: '• Task name — priority — Xd since update'
      If none: 'None — all items fresh'

    priority_distribution: from scan_task by_priority:
      'Urgent: X | High: Y | Normal: Z | Low: W'

    CRITICAL: Use EXACT numbers and names from tool outputs. Do NOT
    estimate, round, or fabricate. Every action must name the specific item.

    Post ONE message only. Do NOT call post or any other Slack tool.
    Do NOT call vault_write.
  expected_output: >
    Confirmation of report posted to Slack.
  agent: backlog_post_agent
  context:
    - intake_scan
    - close_sync
    - decide_and_execute_task
