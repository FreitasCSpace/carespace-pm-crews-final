find_sprint_task:
  description: >
    Call create_or_get_sprint_list to find the active sprint.
    Returns sprint list_id, name, and end date.
  expected_output: >
    JSON with list_id, sprint_name, status.
  agent: retrospective_agent

measure:
  description: >
    Using the sprint list_id, pull ALL tasks via get_tasks_by_list
    (include_closed=True to capture done tasks).

    Calculate:
    - Total tasks, done count, in progress, pending, blocked
    - Completion rate (done / total)
    - Velocity: sum of SP from completed tasks
    - Per-engineer breakdown: tasks/SP each person completed
    - Carry-overs: incomplete tasks (NOT complete/done)
    - Recommended next sprint SP = completed_sp x 0.80

    List each task with its ClickUp URL, assignee, SP, and status.
    List each carryover task with URL, assignee, SP, and reason.
  expected_output: >
    Detailed metrics with task-level detail and ClickUp URLs.
  agent: retrospective_agent
  context:
    - find_sprint_task

close_and_carryover:
  description: >
    Call close_sprint to handle incomplete tasks from the ending sprint.
    This tool:
    - Moves incomplete tasks to Sprint Candidates (for next sprint)
    - Tags them with "carryover"
    - Bumps priority by 1 level
    - Completed tasks STAY in the sprint list (historical record)

    Record: how many carried over, which tasks, total SP.
  expected_output: >
    JSON with carryover count, task names, SP carried over.
  agent: retrospective_agent
  context:
    - measure

post_and_log:
  description: >
    Post ONE retro summary to {slack_sprint} using post_retro.
    Do NOT post to any other channel. ONE message only.

    Parameters:
    - sprint_name: from sprint data
    - completion_pct: percentage
    - velocity_sp: total SP completed
    - carry_over: number of incomplete tasks
    - doc_url: "N/A"

    Also log velocity in Sprint History ({sprint_history_id}) using
    create_task_in_list:
    - name: "Sprint N Velocity: X SP (Y% completion)"
    - description: full metrics + carryover list with ClickUp URLs

    Do NOT call vault_write.
  expected_output: >
    Confirmation of Slack post and velocity log.
  agent: retrospective_agent
  context:
    - close_and_carryover
